name: Build and Push to GHCR

on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read
  packages: write  # Required to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3  # Enables ARM64 emulation

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set timestamps big indian format
        id: timestamp
        run: export GITHUB_TIME=$(date +'%Y%m%d%H%M%S')

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # Build for both architectures
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name}}-${{env.GITHUB_TIME}}
